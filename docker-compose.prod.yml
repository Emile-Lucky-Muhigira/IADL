version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: iadl_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - iadl_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: iadl_api
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    expose:
      - '3001'
    depends_on:
      - postgres
      - redis
    networks:
      - iadl_network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    container_name: iadl_web
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    expose:
      - '3000'
    depends_on:
      - api
    networks:
      - iadl_network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: postgres:16-alpine
    container_name: iadl_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    expose:
      - '5432'
    networks:
      - iadl_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: iadl_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    expose:
      - '6379'
    networks:
      - iadl_network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  iadl_network:
    driver: bridge
