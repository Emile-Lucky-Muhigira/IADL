# Render Blueprint — deploys the IADL EMIS API + PostgreSQL.
# Use: Render Dashboard → New + → Blueprint → pick this repo.
# (The web frontend deploys separately on Vercel from apps/web.)
databases:
  - name: iadl-db
    plan: free
    databaseName: iadl_emis
    user: iadl_user

services:
  - type: web
    name: iadl-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iadl-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      # Set this to your Vercel URL after the web app is deployed (enables CORS).
      - key: WEB_URL
        sync: false
